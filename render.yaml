services:
  - type: web
    name: lua-petshop
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: LUA PetShop
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: SESSION_DOMAIN
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: lua-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lua-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: lua-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: lua-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lua-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file

databases:
  - name: lua-db
    databaseName: lua
    user: laravel
    plan: free
