version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lua-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - lua-network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: lua-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lua-network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: lua-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lua}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lua-network

networks:
  lua-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
